<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1340 860" font-family="Avenir Next, Trebuchet MS, Segoe UI, sans-serif">
  <defs>
    <radialGradient id="bgRadial1" cx="6%" cy="4%" r="55%">
      <stop offset="0%" stop-color="#1d3852"/>
      <stop offset="80%" stop-color="#0e141f"/>
    </radialGradient>
    <radialGradient id="bgRadial2" cx="95%" cy="2%" r="40%">
      <stop offset="0%" stop-color="#133146"/>
      <stop offset="100%" stop-color="#0e141f" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#21d1aa"/>
    </marker>
  </defs>

  <rect width="1340" height="860" fill="#0e141f"/>
  <rect width="1340" height="860" fill="url(#bgRadial1)"/>
  <rect width="1340" height="860" fill="url(#bgRadial2)"/>

  <text x="64" y="60" font-size="13" font-weight="700" fill="#21d1aa" letter-spacing="2">MAKERFLOW PM</text>
  <text x="64" y="92" font-size="26" font-weight="700" fill="#edf4ff">Work flow across features</text>
  <text x="64" y="118" font-size="13" fill="#a7bed8">How a work item travels from idea to closed/auditable across the product&apos;s primary surfaces.</text>
  <line x1="64" y1="138" x2="1276" y2="138" stroke="#304962" stroke-width="1"/>

  <!-- 4 lane headers -->
  <g>
    <rect x="68" y="166" width="300" height="40" rx="20" fill="#1a2636" stroke="#4db0ff"/>
    <text x="218" y="192" font-size="14" font-weight="700" fill="#8fd5ff" text-anchor="middle">1 · CAPTURE</text>

    <rect x="386" y="166" width="300" height="40" rx="20" fill="#1a2636" stroke="#ffbe55"/>
    <text x="536" y="192" font-size="14" font-weight="700" fill="#ffbe55" text-anchor="middle">2 · PLAN</text>

    <rect x="704" y="166" width="300" height="40" rx="20" fill="#1a2636" stroke="#21d1aa"/>
    <text x="854" y="192" font-size="14" font-weight="700" fill="#21d1aa" text-anchor="middle">3 · EXECUTE</text>

    <rect x="1022" y="166" width="256" height="40" rx="20" fill="#1a2636" stroke="#ff5e7e"/>
    <text x="1150" y="192" font-size="14" font-weight="700" fill="#ff5e7e" text-anchor="middle">4 · REVIEW &amp; GOVERN</text>
  </g>

  <!-- 4 lane backings -->
  <g>
    <rect x="68" y="222" width="300" height="540" rx="16" fill="#0e1a2a" opacity="0.4"/>
    <rect x="386" y="222" width="300" height="540" rx="16" fill="#1f1a0e" opacity="0.4"/>
    <rect x="704" y="222" width="300" height="540" rx="16" fill="#0e1f1a" opacity="0.4"/>
    <rect x="1022" y="222" width="256" height="540" rx="16" fill="#1f0e15" opacity="0.4"/>
  </g>

  <!-- Capture cards -->
  <g>
    <g>
      <rect x="84" y="242" width="268" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="84" y="242" width="6" height="86" rx="3" fill="#4db0ff"/>
      <text x="104" y="266" font-size="14" font-weight="700" fill="#edf4ff">Intake</text>
      <rect x="166" y="254" width="74" height="20" rx="10" fill="#1d2d40" stroke="#b88a30"/>
      <text x="203" y="268" font-size="10" font-weight="700" fill="#ffbe55" text-anchor="middle">feature-flag</text>
      <text x="104" y="290" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/intake → intake_requests</text>
      <text x="104" y="310" font-size="11" fill="#a7bed8">scored · convertible to project</text>
    </g>
    <g>
      <rect x="84" y="344" width="268" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="84" y="344" width="6" height="86" rx="3" fill="#4db0ff"/>
      <text x="104" y="368" font-size="14" font-weight="700" fill="#edf4ff">Meeting capture</text>
      <text x="104" y="392" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/agenda → meeting_items</text>
      <text x="104" y="412" font-size="11" fill="#a7bed8">convert items → tasks / projects</text>
    </g>
    <g>
      <rect x="84" y="446" width="268" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="84" y="446" width="6" height="86" rx="3" fill="#4db0ff"/>
