      <text x="422" y="698" font-size="11" fill="#a7bed8">templates → assignments</text>
      <text x="422" y="716" font-size="11" fill="#a7bed8">role-based checklists</text>
      <text x="422" y="734" font-size="11" fill="#a7bed8">due dates · completion</text>
    </g>
  </g>

