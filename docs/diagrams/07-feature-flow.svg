    </g>
    <g>
      <rect x="1038" y="548" width="224" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="1038" y="548" width="6" height="86" rx="3" fill="#ff5e7e"/>
      <text x="1058" y="572" font-size="14" font-weight="700" fill="#edf4ff">CSV export</text>
      <text x="1058" y="596" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">export_all_csv.sh</text>
      <text x="1058" y="616" font-size="11" fill="#a7bed8">vendor exit · portability</text>
    </g>
    <g>
      <rect x="1038" y="650" width="224" height="96" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="1038" y="650" width="6" height="96" rx="3" fill="#ff5e7e"/>
      <text x="1058" y="674" font-size="14" font-weight="700" fill="#edf4ff">Admin governance</text>
      <text x="1058" y="698" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/admin/users</text>
      <text x="1058" y="716" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">purge-item · purge-keyword</text>
      <text x="1058" y="734" font-size="11" fill="#a7bed8">owner-only operations</text>
    </g>
  </g>

  <!-- Cross-lane arrows -->
  <g stroke="#21d1aa" stroke-width="1.6" fill="none" opacity="0.7">
    <line x1="352" y1="285" x2="402" y2="285" marker-end="url(#arrow)"/>
    <line x1="670" y1="285" x2="720" y2="285" marker-end="url(#arrow)"/>
    <line x1="988" y1="285" x2="1038" y2="285" marker-end="url(#arrow)"/>

    <line x1="352" y1="489" x2="402" y2="489" marker-end="url(#arrow)"/>
    <line x1="670" y1="489" x2="720" y2="489" marker-end="url(#arrow)"/>
    <line x1="988" y1="489" x2="1038" y2="489" marker-end="url(#arrow)"/>

    <line x1="352" y1="693" x2="402" y2="693" marker-end="url(#arrow)"/>
    <line x1="670" y1="693" x2="720" y2="693" marker-end="url(#arrow)"/>
    <line x1="988" y1="693" x2="1038" y2="693" marker-end="url(#arrow)"/>
  </g>

  <!-- End-to-end summary -->
  <g>
    <rect x="68" y="782" width="1210" height="60" rx="16" fill="#0b1019" opacity="0.45"/>
    <rect x="66" y="776" width="1210" height="60" rx="16" fill="#1a2636" stroke="#304962"/>
    <text x="92" y="806" font-size="13" font-weight="700" fill="#edf4ff">Common end-to-end loop</text>
    <text x="92" y="824" font-size="12" fill="#a7bed8">intake / meeting → convert to project &amp; tasks → assigned via team/space → executed on kanban → snapshotted in reports → archived via audit</text>
