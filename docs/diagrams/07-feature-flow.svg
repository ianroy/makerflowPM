      <text x="422" y="494" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/settings/teams · /spaces</text>
      <text x="422" y="514" font-size="11" fill="#a7bed8">assignment defaults</text>
    </g>
    <g>
      <rect x="402" y="548" width="268" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="402" y="548" width="6" height="86" rx="3" fill="#ffbe55"/>
      <text x="422" y="572" font-size="14" font-weight="700" fill="#edf4ff">Field configs</text>
      <text x="422" y="596" font-size="11" fill="#a7bed8">per-org custom fields</text>
      <text x="422" y="616" font-size="11" fill="#a7bed8">extend without code</text>
    </g>
    <g>
      <rect x="402" y="650" width="268" height="96" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="402" y="650" width="6" height="96" rx="3" fill="#ffbe55"/>
