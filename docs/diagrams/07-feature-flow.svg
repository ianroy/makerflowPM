      <text x="740" y="310" font-size="11" fill="#a7bed8">drag-and-drop status</text>
    </g>
    <g>
      <rect x="720" y="344" width="268" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="720" y="344" width="6" height="86" rx="3" fill="#21d1aa"/>
