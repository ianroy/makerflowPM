    <g>
      <rect x="1038" y="242" width="224" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="1038" y="242" width="6" height="86" rx="3" fill="#ff5e7e"/>
      <text x="1058" y="266" font-size="14" font-weight="700" fill="#edf4ff">Reports</text>
      <text x="1058" y="290" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/reports · templates</text>
      <text x="1058" y="310" font-size="11" fill="#a7bed8">insight_snapshots seeded</text>
    </g>
    <g>
