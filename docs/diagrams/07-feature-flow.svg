      <text x="422" y="368" font-size="14" font-weight="700" fill="#edf4ff">Custom views</text>
      <text x="422" y="392" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/views — saved filters</text>
      <text x="422" y="412" font-size="11" fill="#a7bed8">columns &amp; sort order</text>
