      <text x="104" y="494" font-size="11" fill="#a7bed8">CSV upload · ICS upload</text>
      <text x="104" y="514" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">import_project_notes.py</text>
    </g>
    <g>
      <rect x="84" y="548" width="268" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="84" y="548" width="6" height="86" rx="3" fill="#4db0ff"/>
      <text x="104" y="572" font-size="14" font-weight="700" fill="#edf4ff">Partnerships pipeline</text>
      <text x="104" y="596" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">partnerships table</text>
      <text x="104" y="616" font-size="11" fill="#a7bed8">external collaboration funnel</text>
    </g>
    <g>
      <rect x="84" y="650" width="268" height="96" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="84" y="650" width="6" height="96" rx="3" fill="#4db0ff"/>
      <text x="104" y="674" font-size="14" font-weight="700" fill="#edf4ff">Direct task creation</text>
      <text x="104" y="698" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/tasks/new POST</text>
      <text x="104" y="716" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/api/tasks/create JSON</text>
      <text x="104" y="734" font-size="11" fill="#a7bed8">CSRF-checked · role-gated</text>
    </g>
  </g>

  <!-- Plan cards -->
  <g>
    <g>
      <rect x="402" y="242" width="268" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="402" y="242" width="6" height="86" rx="3" fill="#ffbe55"/>
      <text x="422" y="266" font-size="14" font-weight="700" fill="#edf4ff">Projects + lanes</text>
