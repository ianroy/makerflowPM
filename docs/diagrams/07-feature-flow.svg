      <text x="740" y="392" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">item_comments · item_watchers</text>
      <text x="740" y="412" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/api/comments/add</text>
