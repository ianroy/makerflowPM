      <text x="740" y="494" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/calendar/gcal/pull · push</text>
      <text x="740" y="514" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">calendar_sync_links</text>
    </g>
    <g>
      <rect x="720" y="548" width="268" height="86" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="720" y="548" width="6" height="86" rx="3" fill="#21d1aa"/>
      <text x="740" y="572" font-size="14" font-weight="700" fill="#edf4ff">Equipment &amp; consumables</text>
      <text x="740" y="596" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/assets · /consumables</text>
      <text x="740" y="616" font-size="11" fill="#a7bed8">maintenance · reorder</text>
    </g>
    <g>
      <rect x="720" y="650" width="268" height="96" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="720" y="650" width="6" height="96" rx="3" fill="#21d1aa"/>
      <text x="740" y="674" font-size="14" font-weight="700" fill="#edf4ff">Delegations</text>
      <text x="740" y="698" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">/tasks/delegate</text>
