  <!-- Cross-cutting -->
  <g>
    <rect x="68" y="712" width="1210" height="178" rx="16" fill="#0b1019" opacity="0.45"/>
    <rect x="66" y="706" width="1210" height="178" rx="16" fill="#1a2636" stroke="#304962"/>
    <text x="92" y="738" font-size="11" font-weight="700" letter-spacing="1.6" fill="#a7bed8">CROSS-CUTTING ENTRY POINTS</text>

    <g font-size="12">
      <text x="92" y="766" font-weight="700" fill="#8fd5ff">Run locally</text>
      <text x="92" y="786" fill="#a7bed8" font-family="Menlo, Consolas, monospace">python3 app/server.py → 127.0.0.1:8080</text>
      <text x="92" y="804" fill="#a7bed8" font-family="Menlo, Consolas, monospace">./run_flask.sh → gunicorn + flask shell</text>

      <text x="92" y="836" font-weight="700" fill="#21d1aa">Add a script</text>
      <text x="92" y="856" fill="#a7bed8">scripts/ — import app.server lazily, follow bootstrap_db.py shape</text>

      <text x="430" y="766" font-weight="700" fill="#8fd5ff">Run in production</text>
      <text x="430" y="786" fill="#a7bed8" font-family="Menlo, Consolas, monospace">wsgi:application via gunicorn</text>
      <text x="430" y="804" fill="#a7bed8">Build/run in .do/app.yaml or systemd unit</text>

      <text x="430" y="836" font-weight="700" fill="#21d1aa">Add docs</text>
      <text x="430" y="856" fill="#a7bed8">docs/*.md → MakerFlow Website/wiki via sync_website_content.py</text>

      <text x="768" y="766" font-weight="700" fill="#ffbe55">Add a feature</text>
      <text x="768" y="786" fill="#a7bed8">1. CREATE TABLE in server.py bootstrap</text>
      <text x="768" y="804" fill="#a7bed8">2. render_*() + route branch in dispatcher</text>
      <text x="768" y="822" fill="#a7bed8">3. Wire JS / CSS in app/static/*</text>
      <text x="768" y="840" fill="#a7bed8">4. Write audit_log + tests + docs</text>
      <text x="768" y="858" fill="#a7bed8" font-style="italic">Tip: ⌘F &quot;def render_&quot; or &quot;if req.path == &quot;</text>
    </g>
  </g>

