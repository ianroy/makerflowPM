<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" font-family="Avenir Next, Trebuchet MS, Segoe UI, sans-serif">
  <defs>
    <radialGradient id="bgRadial1" cx="6%" cy="4%" r="55%">
      <stop offset="0%" stop-color="#1d3852"/>
      <stop offset="80%" stop-color="#0e141f"/>
    </radialGradient>
    <radialGradient id="bgRadial2" cx="95%" cy="2%" r="40%">
      <stop offset="0%" stop-color="#133146"/>
      <stop offset="100%" stop-color="#0e141f" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="800" fill="#0e141f"/>
  <rect width="1280" height="800" fill="url(#bgRadial1)"/>
  <rect width="1280" height="800" fill="url(#bgRadial2)"/>

  <text x="64" y="60" font-size="13" font-weight="700" fill="#21d1aa" letter-spacing="2">MAKERFLOW PM</text>
  <text x="64" y="92" font-size="26" font-weight="700" fill="#edf4ff">Roles &amp; authorization</text>
  <text x="64" y="118" font-size="13" fill="#a7bed8">Six roles. Higher tiers inherit lower abilities. Non-superuser admins are scoped to one workspace.</text>
  <line x1="64" y1="138" x2="1216" y2="138" stroke="#304962" stroke-width="1"/>

  <!-- Left pane: stacked role chips -->
  <g>
    <rect x="68" y="166" width="500" height="600" rx="16" fill="#0b1019" opacity="0.45"/>
    <rect x="66" y="160" width="500" height="600" rx="16" fill="#1a2636" stroke="#304962"/>
    <text x="92" y="194" font-size="11" font-weight="700" letter-spacing="1.6" fill="#a7bed8">ROLE LADDER</text>

    <!-- viewer -->
    <g>
      <rect x="92" y="640" width="440" height="76" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="92" y="640" width="6" height="76" rx="3" fill="#a7bed8"/>
      <text x="120" y="668" font-size="16" font-weight="700" fill="#edf4ff">viewer</text>
      <rect x="200" y="652" width="60" height="22" rx="11" fill="#1d2d40" stroke="#4f79a0"/>
      <text x="230" y="667" font-size="10" font-weight="700" fill="#8fd5ff" text-anchor="middle">tier 1</text>
      <text x="120" y="694" font-size="12" fill="#a7bed8">Read-only access to assigned scopes</text>
    </g>
    <!-- student -->
    <g>
      <rect x="92" y="548" width="440" height="76" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="92" y="548" width="6" height="76" rx="3" fill="#8fd5ff"/>
      <text x="120" y="576" font-size="16" font-weight="700" fill="#edf4ff">student</text>
      <rect x="200" y="560" width="60" height="22" rx="11" fill="#1d2d40" stroke="#4f79a0"/>
      <text x="230" y="575" font-size="10" font-weight="700" fill="#8fd5ff" text-anchor="middle">tier 2</text>
      <text x="120" y="602" font-size="12" fill="#a7bed8">Update own tasks · comment · complete onboarding</text>
    </g>
    <!-- staff -->
    <g>
      <rect x="92" y="456" width="440" height="76" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="92" y="456" width="6" height="76" rx="3" fill="#4db0ff"/>
      <text x="120" y="484" font-size="16" font-weight="700" fill="#edf4ff">staff</text>
      <rect x="200" y="468" width="60" height="22" rx="11" fill="#1d2d40" stroke="#4f79a0"/>
      <text x="230" y="483" font-size="10" font-weight="700" fill="#8fd5ff" text-anchor="middle">tier 3</text>
      <text x="120" y="510" font-size="12" fill="#a7bed8">Manage tasks / projects · run meetings · intake</text>
    </g>
    <!-- manager -->
    <g>
      <rect x="92" y="364" width="440" height="76" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="92" y="364" width="6" height="76" rx="3" fill="#21d1aa"/>
      <text x="120" y="392" font-size="16" font-weight="700" fill="#edf4ff">manager</text>
      <rect x="208" y="376" width="60" height="22" rx="11" fill="#1d2d40" stroke="#5a8a55"/>
      <text x="238" y="391" font-size="10" font-weight="700" fill="#21d1aa" text-anchor="middle">tier 4</text>
      <text x="120" y="418" font-size="12" fill="#a7bed8">Teams · spaces · assignments · reports</text>
    </g>
    <!-- workspace_admin -->
    <g>
      <rect x="92" y="272" width="440" height="76" rx="14" fill="#162332" stroke="#304962"/>
      <rect x="92" y="272" width="6" height="76" rx="3" fill="#ffbe55"/>
      <text x="120" y="300" font-size="16" font-weight="700" fill="#edf4ff">workspace_admin</text>
      <rect x="288" y="284" width="60" height="22" rx="11" fill="#1d2d40" stroke="#b88a30"/>
      <text x="318" y="299" font-size="10" font-weight="700" fill="#ffbe55" text-anchor="middle">tier 5</text>
      <text x="120" y="326" font-size="12" fill="#a7bed8">Memberships · settings · soft-delete · purge — pinned to 1 org</text>
    </g>
    <!-- owner -->
    <g>
      <rect x="92" y="208" width="440" height="56" rx="14" fill="#162332" stroke="#ff5e7e"/>
      <rect x="92" y="208" width="6" height="56" rx="3" fill="#ff5e7e"/>
      <text x="120" y="236" font-size="16" font-weight="700" fill="#edf4ff">owner</text>
      <rect x="180" y="220" width="60" height="22" rx="11" fill="#1d2d40" stroke="#a14454"/>
      <text x="210" y="235" font-size="10" font-weight="700" fill="#ff5e7e" text-anchor="middle">tier 6</text>
      <text x="248" y="236" font-size="12" fill="#a7bed8">Provisioning + governance · only role that can manage other owners</text>
    </g>

    <text x="92" y="740" font-size="11" fill="#a7bed8">The is_superuser flag on users is the only path to cross-workspace administration.</text>
  </g>

  <!-- Right pane: permission matrix -->
  <g>
    <rect x="588" y="166" width="628" height="600" rx="16" fill="#0b1019" opacity="0.45"/>
    <rect x="586" y="160" width="628" height="600" rx="16" fill="#1a2636" stroke="#304962"/>
    <text x="612" y="194" font-size="11" font-weight="700" letter-spacing="1.6" fill="#a7bed8">PERMISSION MATRIX</text>

    <!-- Header row -->
    <g font-size="11" font-weight="700" fill="#edf4ff">
      <text x="612" y="226">Action</text>
      <text x="892" y="226" text-anchor="middle">student</text>
      <text x="952" y="226" text-anchor="middle">staff</text>
      <text x="1012" y="226" text-anchor="middle">mgr</text>
      <text x="1080" y="226" text-anchor="middle">ws_adm</text>
      <text x="1156" y="226" text-anchor="middle">owner</text>
    </g>
    <line x1="612" y1="236" x2="1190" y2="236" stroke="#304962"/>

    <g font-size="12" fill="#a7bed8">
      <text x="612" y="258">View dashboard</text>
      <text x="892" y="258" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="952" y="258" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1012" y="258" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1080" y="258" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="258" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="286">Create task</text>
      <text x="892" y="286" text-anchor="middle" fill="#ffbe55">own</text>
      <text x="952" y="286" text-anchor="middle" fill="#21d1aa">any</text>
      <text x="1012" y="286" text-anchor="middle" fill="#21d1aa">any</text>
      <text x="1080" y="286" text-anchor="middle" fill="#21d1aa">any</text>
      <text x="1156" y="286" text-anchor="middle" fill="#21d1aa">any</text>

      <text x="612" y="314">Comment / watch</text>
      <text x="892" y="314" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="952" y="314" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1012" y="314" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1080" y="314" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="314" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="342">Manage projects</text>
      <text x="892" y="342" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="342" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1012" y="342" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1080" y="342" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="342" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="370">Meeting agendas</text>
      <text x="892" y="370" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="370" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1012" y="370" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1080" y="370" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="370" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="398">Teams / spaces</text>
      <text x="892" y="398" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="398" text-anchor="middle" fill="#506079">—</text>
      <text x="1012" y="398" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1080" y="398" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="398" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="426">Reports (org-wide)</text>
      <text x="892" y="426" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="426" text-anchor="middle" fill="#506079">—</text>
      <text x="1012" y="426" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1080" y="426" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="426" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="454">Memberships / roles</text>
      <text x="892" y="454" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="454" text-anchor="middle" fill="#506079">—</text>
      <text x="1012" y="454" text-anchor="middle" fill="#506079">—</text>
      <text x="1080" y="454" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="454" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="482">Settings / field_configs</text>
      <text x="892" y="482" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="482" text-anchor="middle" fill="#506079">—</text>
      <text x="1012" y="482" text-anchor="middle" fill="#506079">—</text>
      <text x="1080" y="482" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="482" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="510">Soft-delete / restore</text>
      <text x="892" y="510" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="510" text-anchor="middle" fill="#ffbe55">own</text>
      <text x="1012" y="510" text-anchor="middle" fill="#ffbe55">team</text>
      <text x="1080" y="510" text-anchor="middle" fill="#21d1aa">org</text>
      <text x="1156" y="510" text-anchor="middle" fill="#21d1aa">org</text>

      <text x="612" y="538">Permanent purge</text>
      <text x="892" y="538" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="538" text-anchor="middle" fill="#506079">—</text>
      <text x="1012" y="538" text-anchor="middle" fill="#506079">—</text>
      <text x="1080" y="538" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="538" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="566">Audit rollback</text>
      <text x="892" y="566" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="566" text-anchor="middle" fill="#506079">—</text>
      <text x="1012" y="566" text-anchor="middle" fill="#506079">—</text>
      <text x="1080" y="566" text-anchor="middle" fill="#21d1aa">✓</text>
      <text x="1156" y="566" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="594">Provision workspaces</text>
      <text x="892" y="594" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="594" text-anchor="middle" fill="#506079">—</text>
      <text x="1012" y="594" text-anchor="middle" fill="#506079">—</text>
      <text x="1080" y="594" text-anchor="middle" fill="#506079">—</text>
      <text x="1156" y="594" text-anchor="middle" fill="#21d1aa">✓</text>

      <text x="612" y="622">Manage owner accounts</text>
      <text x="892" y="622" text-anchor="middle" fill="#506079">—</text>
      <text x="952" y="622" text-anchor="middle" fill="#506079">—</text>
      <text x="1012" y="622" text-anchor="middle" fill="#506079">—</text>
      <text x="1080" y="622" text-anchor="middle" fill="#506079">—</text>
      <text x="1156" y="622" text-anchor="middle" fill="#21d1aa">✓</text>
    </g>

    <line x1="612" y1="650" x2="1190" y2="650" stroke="#304962"/>
    <text x="612" y="674" font-size="12" fill="#a7bed8">All mutations are CSRF-checked. Most read endpoints accept</text>
    <text x="612" y="690" font-size="11" fill="#a7bed8" font-family="Menlo, Consolas, monospace">?org=&lt;slug&gt;</text>
    <text x="692" y="690" font-size="12" fill="#a7bed8">to switch the active organization.</text>
    <text x="612" y="716" font-size="12" fill="#a7bed8">Enforcement points in code:</text>
    <text x="612" y="734" font-size="11" fill="#8fd5ff" font-family="Menlo, Consolas, monospace">get_auth_context()</text>
    <text x="744" y="734" font-size="11" fill="#a7bed8">·</text>
    <text x="760" y="734" font-size="11" fill="#8fd5ff" font-family="Menlo, Consolas, monospace">role_allows()</text>
    <text x="858" y="734" font-size="11" fill="#a7bed8">· explicit</text>
    <text x="918" y="734" font-size="11" fill="#8fd5ff" font-family="Menlo, Consolas, monospace">organization_id</text>
    <text x="1028" y="734" font-size="11" fill="#a7bed8">filters on every SQL.</text>
  </g>

  <text x="64" y="788" font-size="11" fill="#a7bed8">Tokens: brand <tspan fill="#4db0ff">●</tspan> brand-2 <tspan fill="#21d1aa">●</tspan> focus <tspan fill="#ffbe55">●</tspan> danger <tspan fill="#ff5e7e">●</tspan></text>
</svg>
